			#Blackscreen {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background-color: black;
				opacity: 1;
				transition: opacity 1s ease-in-out;

			.social {

				}
			}
			body {
				background-color:#101114;
				box-sizing: border-box;
				color:#FFFFFF;
				transition-duration:0.3s;
				font-family: Arial;
				margin: 0;
				
				.header {
					align-items: center;
					background-color: #202124;
					display: flex;
					justify-content: space-between;
					height:6vh;
					padding: 0vh 22.5% 0vh 0%;
					margin:2.5vh 20%;
					border-radius:3vh;

					h1 {

						text-shadow:none;
						
						a {
							text-decoration:none;
							color:transparent;
						}
					}
					
				}
				
				.content {
					overflow: hidden;
					padding: 2vh 2%;
					height:84vh;
					transition-duration:0.5s;
					background-color:transparent;
				}
				
			}
			
			.header .social a {
				color: #222222;
				padding: 0 5px;
				text-decoration : none;
			}
			
			#ytplayer {
				width: 100%;
				height: 100%;
				frameborder: 0;
				border-radius:24px;
			}
			
			#ytplayer:hover {
				border-radius:0;
			}
			
			.header:hover {
				background-color: #303134;
				transition-duration:0.3s;
				display: flex;
				justify-content: space-between;
				height:10vh;
				padding: 0.5vh 2%;
				margin:0vh 0%;
				border-radius:0vh 0vh 3vh 3vh;
				h1 {
					color: #5500F0;
					font-size: 30px;
					text-shadow:
						0 0 0px #5500F0,
						0 0 7px #fff,
						0 0 10px #fff,
						0 0 21px #fff
						
				}
				span {
					color : #ffffff; 
					transition-duration : 0.3s;
				}
				.social {
					transition-duration:0.4s;
					
					font {
						font-size:32px;
						transition-duration:0.4s;
					}
				}
			}
				.content:hover {
					padding:0vh 0%;
					transition-duration:0.5s;
					height:89vh;
				}
		</style>	<!-- ----------(End) Style ---------- -->
	</head>
	<body>
		<div id="Blackscreen"></div>
				<script>
		window.addEventListener("load", function() {
    var blackscreen = document.getElementById("Blackscreen");

    setTimeout(function() {
        blackscreen.style.opacity = "0";
        setTimeout(function() {
            blackscreen.style.display = "none";
        }, 1000); // Hides the div 1 second after it becomes transparent
    }, 3000);

    // Show text after 0.5s to 2s
    setTimeout(function() {
        var text1 = document.createElement("p");
        text1.innerHTML = "ChefUiChef.fr";
        text1.style.color = "white";
        text1.style.position = "absolute";
        text1.style.top = "40%";
        text1.style.left = "50%";
        text1.style.transform = "translate(-50%, -50%)";
        text1.style.opacity = "0"; // Initially hidden
        text1.style.transition = "opacity 0.5s ease-in-out"; // Smooth fade-in/out
        text1.style.fontSize = "4em"; // Increase font size
        blackscreen.appendChild(text1);

        // Show text with fade in effect
        setTimeout(function() {
            text1.style.opacity = "1";
        }, 10); // Wait a bit before applying transition

        // Remove text with fade out effect
        setTimeout(function() {
            text1.style.opacity = "0";
            setTimeout(function() {
                blackscreen.removeChild(text1);
            }, 500); // Remove text after fade out
        }, 1500); // Remove text after 1.5 seconds

        // Show text "In collaboration with" after 1 second
        setTimeout(function() {
            var text2 = document.createElement("p");
            text2.innerHTML = "In collaboration with Chris";
            text2.style.color = "white";
            text2.style.position = "absolute";
            text2.style.bottom = "20px";
            text2.style.left = "50%";
            text2.style.transform = "translateX(-50%)";
            text2.style.opacity = "0"; // Initially hidden
            text2.style.transition = "opacity 0.5s ease-in-out"; // Smooth fade-in/out
            text2.style.fontSize = "3em"; // Increase font size
            blackscreen.appendChild(text2);

            // Show text with fade in effect
            setTimeout(function() {
                text2.style.opacity = "1";
            }, 10); // Wait a bit before applying transition

            // Remove text with fade out effect
            setTimeout(function() {
                text2.style.opacity = "0";
                setTimeout(function() {
                    blackscreen.removeChild(text2);
                }, 500); // Remove text after fade out
            }, 2000); // Remove text after 2 seconds
        }, 1000); // Show text "In collaboration with" after 1 second
    }, 500); // Show text "chefuichef.fr" after 0.5 second
});





	</script>
